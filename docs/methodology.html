<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Methodology — NJ Transit Delay Cost Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --newsprint: #f0eeeb;
      --ink: #1a1a1a;
      --ink-light: #4a4a4a;
      --ink-faint: #8a8a8a;
      --rule: #c0bdb8;
    }

    body {
      font-family: 'EB Garamond', 'Georgia', 'Times New Roman', serif;
      background-color: var(--newsprint);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* === HEADER === */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
    }

    .logo img {
      height: 64px;
      width: auto;
      display: block;
    }

    .social-icons {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .social-icons a {
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
    }

    .social-icons a:hover {
      color: var(--ink);
    }

    .social-icons svg {
      width: 32px;
      height: 32px;
    }

    /* === MAIN CONTENT === */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 2rem 3rem;
    }

    .content-block {
      max-width: 640px;
      width: 100%;
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
    }

    /* === MARKDOWN CONTENT STYLES === */
    #methodology-content p {
      font-size: 1.1rem;
      line-height: 1.65;
      color: var(--ink);
      margin-top: 1.1rem;
    }

    #methodology-content p:first-child {
      margin-top: 0;
    }

    #methodology-content h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--rule);
    }

    #methodology-content h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.4rem;
    }

    #methodology-content ul,
    #methodology-content ol {
      font-size: 1.1rem;
      line-height: 1.65;
      margin-top: 0.75rem;
      margin-left: 1.5rem;
    }

    #methodology-content li {
      margin-top: 0.3rem;
    }

    #methodology-content a {
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    #methodology-content a:hover {
      color: var(--ink-light);
    }

    #methodology-content strong {
      font-weight: 600;
    }

    #methodology-content em {
      font-style: italic;
    }

    #methodology-content hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2rem 0;
    }

    #methodology-content table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 1rem;
    }

    #methodology-content th,
    #methodology-content td {
      text-align: left;
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid var(--rule);
    }

    #methodology-content th {
      font-weight: 600;
      border-bottom: 2px solid var(--rule);
    }

    #methodology-content blockquote {
      border-left: 3px solid var(--rule);
      margin: 1rem 0;
      padding-left: 1rem;
      color: var(--ink-light);
      font-style: italic;
    }

    #methodology-content code {
      font-family: monospace;
      font-size: 0.9em;
      background: rgba(0,0,0,0.06);
      padding: 0.1em 0.3em;
      border-radius: 2px;
    }

    .loading-text {
      font-size: 1.1rem;
      color: var(--ink-faint);
    }

    /* === FOOTER === */
    footer {
      border-top: 1px solid var(--rule);
      padding: 1.25rem 2rem;
      text-align: center;
    }

    .footer-text {
      font-size: 0.8rem;
      color: var(--ink-faint);
      line-height: 1.5;
      max-width: 600px;
      margin: 0 auto;
    }

    .footer-text a {
      color: var(--ink-faint);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .footer-text a:hover {
      color: var(--ink-light);
    }

    .footer-nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.25rem;
    }

    .footer-nav a {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
    }

    .footer-nav a:hover {
      color: var(--ink-light);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* === RESPONSIVE === */
    @media (max-width: 600px) {
      header {
        padding: 1rem 1.25rem;
      }

      main {
        padding: 1.5rem 1.25rem 2rem;
      }

      .page-title {
        font-size: 1.6rem;
      }

      footer {
        padding: 1rem 1.25rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="njt-delay-tracker-logo.svg" alt="NJT Delay Tracker">
    </div>

    <nav class="social-icons">
      <a href="https://bsky.app/profile/njtdelaytracker.bsky.social" aria-label="Bluesky" title="Follow on Bluesky">
        <svg viewBox="0 0 600 530" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M135.72 44.03C202.22 93.87 273.72 195.17 300 249.57c26.28-54.4 97.78-155.7 164.28-205.54C528.08-5.57 600-28.93 600 62.33c0 18.14-10.4 152.43-16.5 174.13-21.2 75.37-98.47 94.6-166.87 82.93 119.47 20.4 149.87 87.93 84.2 155.47-124.87 128.53-179.6-32.2-193.57-73.37-2.54-7.5-3.73-11-7.27-11s-4.73 3.5-7.27 11c-13.97 41.17-68.7 201.9-193.57 73.37-65.67-67.54-35.27-135.07 84.2-155.47-68.4 11.67-145.67-7.56-166.87-82.93C10.4 214.76 0 80.47 0 62.33 0-28.93 71.92-5.57 135.72 44.03Z"/>
        </svg>
      </a>
    </nav>
  </header>

  <main>
    <div class="content-block">
      <h1 class="page-title">Methodology</h1>
      <div id="methodology-content">
        <p class="loading-text">Loading&hellip;</p>
      </div>
    </div>
  </main>

  <footer>
    <nav class="footer-nav">
      <a href="methodology.html">Methodology</a>
      <a href="graphs.html">Data and Trends</a>
      <a href="#">Contact Us</a>
    </nav>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script>
    fetch('methodology.md')
      .then(function(r) {
        if (!r.ok) throw new Error('Failed to load');
        return r.text();
      })
      .then(function(text) {
        document.getElementById('methodology-content').innerHTML = marked.parse(text);
      })
      .catch(function() {
        document.getElementById('methodology-content').innerHTML =
          '<p>Methodology content is currently unavailable. Please check back shortly.</p>';
      });
  </script>

</body>
</html>
