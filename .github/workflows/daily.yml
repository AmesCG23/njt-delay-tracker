# daily.yml — One daily run, Mon–Fri
#
# Scheduled at 12:30 UTC: 7:30am ET in winter (EST), 8:30am ET in summer (EDT).
# GitHub Actions cron is UTC-only and can't track DST, so this is the
# closest single expression to "8am ET year-round."
# With typical GitHub queue delays, expects to fire around 8–9am ET actual.
#
# What it does:
#   1. Fetches yesterday morning (5:00–10:30 AM ET) from Bluesky
#   2. Interprets, deduplicates, calculates, logs to Sheets
#   3. Fetches yesterday evening (3:00–8:30 PM ET) from Bluesky
#   4. Interprets, deduplicates, calculates, logs to Sheets
#   5. Posts one daily summary tweet
#   6. Logs the tweet to the Tweet_log tab

name: NJT Daily Pipeline

on:
  schedule:
    - cron: "30 12 * * 2-6"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Sheets, no tweet)?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # contents: write lets the run commit the refreshed docs/og-card.png
    # (social sharing card with the live cumulative total) back to the repo.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          # AI-composed daily post (src/composer.py). Change to "false" to
          # instantly roll back to the fixed template — no code change needed.
          USE_COMPOSER: "true"
          # Social card with live total (src/og_card.py). "false" freezes
          # docs/og-card.png at its last committed version.
          USE_OG_CARD: "true"
          # bettertrains.org link card on the daily Bluesky post. "false"
          # reverts to plain text posts.
          USE_LINK_CARD: "true"
          # Bake the day's figures into the static site (src/web_stats.py):
          # index.html/graphs.html sentinel spans, data/latest.json, and
          # sitemap lastmod — so non-JS crawlers (search engines' first
          # pass, AI crawlers) see real numbers. "false" freezes the baked
          # figures at their last committed values.
          USE_WEB_STATS: "true"
        run: |
          echo "DRY_RUN=$DRY_RUN"
          python src/daily.py

      # Publish the refreshed site files: the social card (og_card.py) and
      # the baked-in site stats (web_stats.py — static figures in
      # index.html/graphs.html, data/latest.json, sitemap lastmod).
      # GitHub Pages serves the committed files, so link previews and
      # non-JS crawlers pick up the new numbers. Skipped on dry runs;
      # a no-op if nothing in docs/ changed.
      - name: Commit refreshed site files
        if: ${{ (github.event.inputs.dry_run || 'false') == 'false' }}
        run: |
          if [ -z "$(git status --porcelain -- docs/)" ]; then
            echo "Site files unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Update site stats and social card with latest figures"
          for i in 1 2 3; do
            git push origin "HEAD:${{ github.ref_name }}" && exit 0
            echo "Push failed (attempt $i) — rebasing and retrying..."
            git fetch origin "${{ github.ref_name }}"
            git rebase "origin/${{ github.ref_name }}"
            sleep 5
          done
          echo "Could not push refreshed card after 3 attempts." >&2
          exit 1
