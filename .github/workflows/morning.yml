# morning.yml — Morning rush summary
# Fires at 12:59 UTC (targets ~15:00 UTC actual after ~2h GitHub delay)
# = ~11:00am EDT / ~10:00am EST
# Covers window: 09:00–14:30 UTC = 5:00am–10:30am EDT

name: NJT Morning Summary

on:
  schedule:
    - cron: "59 12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  run-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run morning summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PERIOD: "morning"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "PERIOD=morning | DRY_RUN=$DRY_RUN"
          python src/main.py
