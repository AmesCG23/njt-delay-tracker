# .github/workflows/run_pipeline.yml
#
# Two scheduled jobs — one for each rush hour summary.
# Each job runs once, fetches the full window of Bluesky posts,
# interprets, calculates, and posts. No continuous polling needed.
#
# Times (UTC):
#   Morning summary: 15:00 UTC = 11:00am EDT / 10:00am EST
#   Evening summary: 02:00 UTC = 10:00pm EDT /  9:00pm EST
#
# The aggregator detects EDT vs EST automatically using Python's
# DST calendar rules and adjusts the fetch window accordingly.
#
# Monthly usage: ~60 minutes — well within GitHub's 2,000 free tier.

name: NJT Delay Tracker

on:
  schedule:
    # Morning summary: 15:00 UTC (11am EDT / 10am EST)
    - cron: "0 15 * * 1-5"
    # Evening summary: 02:00 UTC (10pm EDT / 9pm EST)
    - cron: "0 2 * * 2-6"

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      period:
        description: "morning or evening"
        required: false
        default: "morning"
        type: choice
        options: ["morning", "evening"]
      dry_run:
        description: "Dry run (no posting or logging)?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Determine period from schedule or manual input
      - name: Determine period
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "period=${{ github.event.inputs.period }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            echo "UTC hour: ${HOUR}"
            if [ "$HOUR" = "15" ]; then
              echo "period=morning" >> $GITHUB_OUTPUT
            else
              echo "period=evening" >> $GITHUB_OUTPUT
            fi
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      # Run the pipeline
      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PERIOD: ${{ steps.config.outputs.period }}
          DRY_RUN: ${{ steps.config.outputs.dry_run }}
        run: |
          echo "PERIOD=$PERIOD | DRY_RUN=$DRY_RUN"
          python src/main.py
