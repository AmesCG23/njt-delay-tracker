# .github/workflows/run_pipeline.yml
#
# Two scheduled jobs — one for each rush hour summary.
#
# UTC windows (fixed, not calculated from current time):
#   Morning: 09:00–14:30 UTC = 5:00am–10:30am EDT / 4:00am–9:30am EST
#   Evening: 19:00–01:00 UTC = 3:00pm–9:00pm EDT / 2:00pm–8:00pm EST
#
# Period is detected via github.event.schedule (the exact cron string),
# NOT from the current clock hour. This means GitHub delays of any length
# won't cause misclassification.
#
# Monthly usage: ~60 minutes — well within GitHub's 2,000 free tier.

name: NJT Delay Tracker

on:
  schedule:
    # Morning summary: 15:00 UTC (11am EDT / 10am EST)
    - cron: "0 15 * * *"
    # Evening summary: 02:00 UTC (10pm EDT / 9pm EST)
    - cron: "0 2 * * *"

  workflow_dispatch:
    inputs:
      period:
        description: "morning or evening"
        required: false
        default: "morning"
        type: choice
        options: ["morning", "evening"]
      dry_run:
        description: "Dry run (no posting or logging)?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Determine period using github.event.schedule (the cron string that
      # fired this run), NOT the current clock hour. This is immune to
      # GitHub Actions delays of any length.
      - name: Determine period
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "period=${{ github.event.inputs.period }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 15 * * 1-5" ]; then
            echo "period=morning" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          else
            echo "period=evening" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PERIOD: ${{ steps.config.outputs.period }}
          DRY_RUN: ${{ steps.config.outputs.dry_run }}
        run: |
          echo "PERIOD=$PERIOD | DRY_RUN=$DRY_RUN"
          python src/main.py
